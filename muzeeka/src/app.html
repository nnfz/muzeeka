<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Muzeeka — Premium Music Player" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Muzeeka</title>

    <!-- Prevent white flash on window show (especially settings window) -->
    <style>
      html, body {
        background-color: #0a0a0f !important;
        margin: 0;
        padding: 0;
      }
    </style>

    <script>
      // Force dark background as early as possible to avoid white flash when window is shown
      (function() {
        try {
          document.documentElement.style.backgroundColor = '#0a0a0f';
          if (document.body) document.body.style.backgroundColor = '#0a0a0f';
        } catch(e) {}
      })();

      document.addEventListener(
        'contextmenu',
        (event) => event.preventDefault(),
        { capture: true }
      );
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
